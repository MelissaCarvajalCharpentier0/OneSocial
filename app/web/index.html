<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneSocial Post Creator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icons/default.ico">
    <script type="text/javascript" src="/eel.js"></script>
</head>
<body>
    <div class="main-layout">
        <!-- Left Sidebar: Existing Accounts -->
        <aside class="account-sidebar">
            <div class="sidebar-title">Accounts</div>
            <div class="sidebar-subtitle">Select where to publish</div>

            <div id="account-list-wrap" class="account-list-wrap">
                <div id="account-list" class="account-list"></div>
            </div>

            <div id="account-summary" class="account-summary">Loading accounts...</div>
        </aside>

        <!-- Main Container -->
        <div class="container">
            <div class="header-actions">
                <h1>Create Post</h1>
                <button id="show-link-sidebar-btn" class="link-accounts-main-btn">+ Link Accounts</button>
            </div>
            <div class="subtitle">Share your message with the world</div>

            <div class="form-group">
                <label>Header</label>
                <input type="text" id="post-header" placeholder="What's the title?" maxlength="100">
                <div class="char-counter">
                    <span id="header-count">0</span>/100
                </div>
            </div>

            <div class="form-group">
                <label>Body</label>
                <textarea id="post-body" placeholder="Write your post content here..." maxlength="500"></textarea>
                <div class="char-counter">
                    <span id="body-count">0</span>/500
                </div>
            </div>

            <div class="form-group">
                <label>Image</label>
                <input type="file" id="image-input" accept="image/*" hidden>
                <button class="file-button" onclick="document.getElementById('image-input').click()">
                    Select Image
                </button>
                <span id="file-name">No file selected</span>
            </div>

            <button class="post-button" onclick="createPost()">
                Publish Post
            </button>
            <div id="status" class="status hidden"></div>
        </div>

        <!-- Right Sidebar: Post Preview -->
        <aside class="preview-sidebar">
            <div class="preview-title">Post Preview</div>
            <div id="preview-container" class="preview-container"></div>
        </aside>
    </div>

    <div id="overlay" class="overlay"></div>

    <!-- Right Sidebar: Link Accounts (hidden by default) -->
    <aside id="link-sidebar" class="link-sidebar hidden-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Link Accounts</div>
            <button id="close-link-sidebar" class="close-sidebar-btn">&times;</button>
        </div>
        <div class="sidebar-subtitle">Connect new social accounts</div>
    
        <!-- Mastodon Section -->
        <div class="link-section">
            <button id="toggle-mastodon-form" class="link-provider-btn">
                <span>Mastodon</span>
                <span class="expand-icon">▼</span>
            </button>
            <div id="mastodon-form" class="link-form hidden-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="mastodon-username" placeholder="e.g., @user@mastodon.social">
                </div>

                <button id="get-mastodon-url-btn" class="secondary-btn">Connect & Get URL</button>

                <div class="form-group">
                    <label>Auth Code (If Prompted)</label>
                    <input type="text" id="mastodon-code" placeholder="Paste the code from OAuth">
                </div>
                
                <button id="link-mastodon-btn" class="link-action-btn">Link with Auth Code</button>
                <div id="mastodon-status" class="link-status"></div>
            </div>
        </div>
    
        <!-- WordPress Section -->
        <div class="link-section">
            <button id="toggle-wordpress-form" class="link-provider-btn">
                <span>WordPress</span>
                <span class="expand-icon">▼</span>
            </button>
            <div id="wordpress-form" class="link-form hidden-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="wp-username" placeholder="Display name for this account">
                </div>
                <div class="form-group">
                    <label>Client ID</label>
                    <input type="text" id="wp-client-id" placeholder="WordPress Client ID">
                </div>
                <div class="form-group">
                    <label>Client Secret</label>
                    <input type="text" id="wp-client-secret" placeholder="WordPress Client Secret">
                </div>
                <button id="link-wordpress-btn" class="link-action-btn">Link WordPress Account</button>
                <div id="wordpress-status" class="link-status"></div>
            </div>
        </div>

        <!-- Bluesky Section -->
        <div class="link-section">
            <button id="toggle-bluesky-form" class="link-provider-btn">
                <span>Bluesky</span>
                <span class="expand-icon">▼</span>
            </button>
            <div id="bluesky-form" class="link-form hidden-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="bk-username" placeholder="e.g., @user.bsky.social">
                </div>
                <div class="form-group">
                    <label>App Password</label>
                    <input type="text" id="bk-password" placeholder="App-password">
                </div>
                <button id="link-bluesky-btn" class="link-action-btn">Link Bluesky Account</button>
                <div id="bluesky-status" class="link-status"></div>
            </div>
        </div>
    </aside>

    <div id="modal" class="modal">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-actions">
            <button id="modal-cancel" class="modal-btn cancel">Cancel</button>
            <button id="modal-confirm" class="modal-btn confirm">OK</button>
        </div>
    </div>

    <div id="modal-overlay" class="overlay hidden"></div>

    <script src="app.js"></script>
</body>
</html>
